<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級作業未交追蹤系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border-top-color: #e74c3c;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* === 座位圖專用樣式 === */
        .seat-card { transition: all 0.2s ease; cursor: pointer; }
        .seat-card:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .seat-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            width: 20px; height: 20px;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="bg-red-50 min-h-screen font-sans text-gray-800">

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbw8TX4fgMP_33kjoMjF8HtEEeSxgAsuponp3AUG8sKbwReYl3uxvjROajY1NMMsUMhT/exec'; 
        const SYSTEM_TYPE = 'unsubmitted';
    </script>

    <div class="max-w-4xl mx-auto p-4 md:p-6 lg:p-8">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-red-600 mb-2">任務未交追蹤系統</h1>
            <p class="text-gray-600">記錄 1~29 號同學的任務缺交數量 (AF=0)</p>
        </header>

        <!-- === 上半部：登記系統 === -->
        <main class="bg-white rounded-xl shadow-md border-t-4 border-red-500 p-6">
            
            <div class="mb-6">
                <label for="taskSelect" class="block text-sm font-medium text-gray-700 mb-2">選擇任務或新建</label>
                <select id="taskSelect" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-red-500">
                    <option value="" disabled selected>請選擇...</option>
                    <option value="new" class="text-red-600 font-bold">+ 新建任務項目</option>
                </select>
            </div>

            <div id="newTaskForm" class="hidden mb-6 p-4 bg-red-50 border border-red-100 rounded-lg">
                <h3 class="font-bold text-red-800 mb-3">新建任務 (將寫入 AF=0)</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-700 mb-1">任務名稱</label>
                        <input type="text" id="newTaskName" placeholder="例如：數學講義 P12" class="w-full border border-gray-300 rounded p-2 focus:outline-none focus:ring-2 focus:ring-red-500">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-700 mb-1">免交人員座號 (請用逗號隔開)</label>
                        <input type="text" id="exemptStudents" placeholder="例如：5, 12, 28" class="w-full border border-gray-300 rounded p-2 focus:outline-none focus:ring-2 focus:ring-red-500">
                    </div>
                    <button id="createTaskBtn" class="bg-red-600 text-white px-4 py-2 rounded shadow hover:bg-red-700 transition w-full sm:w-auto">
                        建立並新增至表單
                    </button>
                </div>
            </div>

            <div id="studentSection" class="hidden">
                <div class="flex flex-col mb-4">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-3 gap-4">
                        <h3 id="studentSectionTitle" class="text-lg font-bold text-gray-800 mt-1">登記未交數量</h3>
                        <div class="flex flex-wrap items-center gap-4">
                            
                            <div class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-full shadow-sm border border-gray-200">
                                <span id="textSub" class="text-sm font-bold text-gray-400 cursor-pointer select-none" onclick="document.getElementById('modeToggle').click()">減</span>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" id="modeToggle" class="sr-only peer" checked>
                                    <div class="w-11 h-6 bg-green-500 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-red-500 shadow-inner"></div>
                                </label>
                                <span id="textAdd" class="text-sm font-bold text-red-600 cursor-pointer select-none" onclick="document.getElementById('modeToggle').click()">增</span>
                            </div>

                            <label class="flex items-center cursor-pointer bg-white border border-gray-300 px-2 py-1.5 rounded shadow-sm hover:bg-gray-50 transition">
                                <input type="checkbox" id="hideHandedInToggle" class="w-4 h-4 text-red-600 rounded focus:ring-red-500 cursor-pointer">
                                <span class="ml-2 text-sm text-gray-700 font-bold select-none">隱藏已(免)交</span>
                            </label>

                        </div>
                    </div>
                    
                    <div class="text-[11px] text-gray-600 p-2 bg-gray-50 rounded border flex flex-wrap gap-x-3 gap-y-1 items-center">
                        <span class="font-bold mr-1">點擊切換數量 (色碼):</span>
                        <span class="inline-flex items-center"><span class="w-2.5 h-2.5 bg-gray-200 border border-gray-300 rounded-full mr-1"></span>0</span>
                        <span class="inline-flex items-center"><span class="w-2.5 h-2.5 bg-[#8B4513] rounded-full mr-1"></span>1棕</span>
                        <span class="inline-flex items-center"><span class="w-2.5 h-2.5 bg-red-500 rounded-full mr-1"></span>2紅</span>
                        <span class="inline-flex items-center"><span class="w-2.5 h-2.5 bg-orange-500 rounded-full mr-1"></span>3橙</span>
                        <span class="inline-flex items-center"><span class="w-2.5 h-2.5 bg-yellow-400 rounded-full mr-1"></span>4黃</span>
                        <span class="inline-flex items-center"><span class="w-2.5 h-2.5 bg-green-500 rounded-full mr-1"></span>5綠</span>
                        <span class="inline-flex items-center"><span class="w-2.5 h-2.5 bg-blue-500 rounded-full mr-1"></span>6藍</span>
                        <span class="inline-flex items-center"><span class="w-2.5 h-2.5 bg-purple-500 rounded-full mr-1"></span>7紫</span>
                        <span class="inline-flex items-center"><span class="w-2.5 h-2.5 bg-gray-500 rounded-full mr-1"></span>8灰</span>
                        <span class="inline-flex items-center"><span class="w-2.5 h-2.5 bg-white border border-gray-400 rounded-full mr-1"></span>9白</span>
                    </div>
                </div>
                
                <div class="grid grid-cols-5 sm:grid-cols-6 md:grid-cols-8 gap-2 mb-6" id="studentGrid">
                    <!-- JS 動態生成 -->
                </div>

                <div class="border-t pt-6">
                    <p class="text-sm text-red-600 font-bold mb-2 text-center">💡 提示：按下送出後，灰色(未點擊)的座號將自動記錄為「0 缺交」。</p>
                    <button id="submitBtn" class="w-full bg-red-600 text-white text-lg font-bold px-4 py-3 rounded-lg shadow hover:bg-red-700 transition flex justify-center items-center">
                        送出缺交數量紀錄
                    </button>
                </div>
            </div>

        </main>

        <!-- === 下半部：座位紀錄瀏覽器區塊 === -->
        <div class="bg-white rounded-xl shadow-md border-t-4 border-indigo-500 p-6 mt-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-start mb-4 border-b pb-4 gap-4">
                <div class="w-full flex-1">
                    <h2 class="text-xl font-bold text-gray-800">缺交的人坐哪裡？</h2>
                    <p class="text-xs text-gray-500 mt-1 mb-3">
                        💡 提示：勾選下方任務可自動加總各科未交數量。
                    </p>
                    <!-- 新增：任務勾選區 -->
                    <div id="seatTaskFilters" class="flex flex-wrap gap-2">
                        <!-- 由 JS 動態填充 -->
                    </div>
                </div>
                <div class="flex flex-col items-end gap-2 shrink-0 mt-2 md:mt-0">
                    <div id="seatStatus" class="text-xs text-gray-500 flex items-center gap-2">
                        <div class="seat-spinner"></div> 同步中...
                    </div>
                </div>
            </div>

            <div id="seat-grid" class="grid grid-cols-6 gap-2 mb-8">
                <!-- 由 JS 自動填充 -->
            </div>

            <div class="flex justify-center">
                <div class="border-2 border-gray-300 bg-gray-50 w-44 py-2 text-center rounded text-gray-400 font-bold tracking-[0.8em] text-sm shadow-inner">
                    講桌
                </div>
            </div>
        </div>

    </div>

    <!-- 自訂 Modal -->
    <div id="customModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex flex-col justify-center items-center z-[60] hidden transition-opacity">
        <div class="bg-white rounded-xl shadow-xl max-w-sm w-full p-6 mx-4 transform transition-transform scale-100">
            <h3 id="modalTitle" class="text-lg font-bold text-gray-900 mb-2">提示</h3>
            <p id="modalMessage" class="text-gray-600 mb-6 whitespace-pre-line leading-relaxed text-sm"></p>
            <div class="flex justify-end gap-3" id="modalButtons"></div>
        </div>
    </div>

    <div id="loadingOverlay" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex flex-col justify-center items-center z-50">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
        <p class="text-white font-medium" id="loadingText">載入資料中...</p>
    </div>

    <script>
        // 狀態變數 (上半部)
        let tasksData = [];
        let currentSelectedTask = null;
        let missingCounts = new Map(); 

        // 狀態變數 (下半部 - 座位圖)
        const SEAT_GAS_URL = "https://script.google.com/macros/s/AKfycbzpnkrJlAXKdHh4RYoPOrGTEF9SCvTcwFfpzVQchSSqLSbNMXYAYXZdMebdG4Dl6P3K/exec";
        let currentSeats = [];
        let selectedSeatTasks = new Set(); // 記錄目前被勾選要在座位表加總的任務 rowIndex
        let knownTaskIds = new Set(); // 記錄已知的任務，用來判斷新任務並預設全選
        
        const colorCycle = [
            { type: 0, class: "bg-green-200 border-green-300 text-green-900", label: "綠色" },
            { type: 1, class: "bg-red-200 border-red-300 text-red-900", label: "粉紅" },
            { type: 2, class: "bg-blue-200 border-blue-300 text-blue-900", label: "藍色" },
            { type: 3, class: "bg-yellow-200 border-yellow-300 text-yellow-900", label: "黃色" },
            { type: 4, class: "bg-purple-200 border-purple-300 text-purple-900", label: "紫色" },
            { type: -1, class: "bg-gray-100 border-dashed border-gray-200 opacity-50 text-gray-400", label: "空位" }
        ];

        const colorMap = {
            0: { bg: 'bg-gray-200', text: 'text-gray-700' },
            1: { bg: 'bg-[#8B4513]', text: 'text-white' }, 
            2: { bg: 'bg-red-500', text: 'text-white' },   
            3: { bg: 'bg-orange-500', text: 'text-white' }, 
            4: { bg: 'bg-yellow-400', text: 'text-black' }, 
            5: { bg: 'bg-green-500', text: 'text-white' },  
            6: { bg: 'bg-blue-500', text: 'text-white' },   
            7: { bg: 'bg-purple-500', text: 'text-white' }, 
            8: { bg: 'bg-gray-500', text: 'text-white' },   
            9: { bg: 'bg-white', text: 'text-black', extra: 'border border-gray-400' } 
        };

        const taskSelect = document.getElementById('taskSelect');
        const newTaskForm = document.getElementById('newTaskForm');
        const studentSection = document.getElementById('studentSection');
        const studentGrid = document.getElementById('studentGrid');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const createTaskBtn = document.getElementById('createTaskBtn');
        const submitBtn = document.getElementById('submitBtn');
        const hideHandedInToggle = document.getElementById('hideHandedInToggle');
        const modeToggle = document.getElementById('modeToggle');
        const textSub = document.getElementById('textSub');
        const textAdd = document.getElementById('textAdd');

        window.addEventListener('DOMContentLoaded', () => {
            fetchTasks('latest');
            generateStudentButtons();
            fetchSeats(); 
        });

        function showLoading(text = '處理中...') {
            loadingText.textContent = text;
            loadingOverlay.classList.remove('hidden');
        }
        function hideLoading() {
            loadingOverlay.classList.add('hidden');
        }

        function showModal(title, message, isConfirm = false) {
            hideLoading();
            return new Promise((resolve) => {
                const modal = document.getElementById('customModal');
                document.getElementById('modalTitle').textContent = title;
                document.getElementById('modalMessage').textContent = message;
                const buttonsContainer = document.getElementById('modalButtons');
                buttonsContainer.innerHTML = '';

                const closeModal = (result) => {
                    modal.classList.add('hidden');
                    resolve(result);
                };

                if (isConfirm) {
                    const cancelBtn = document.createElement('button');
                    cancelBtn.className = 'px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg font-bold transition';
                    cancelBtn.textContent = '取消';
                    cancelBtn.onclick = () => closeModal(false);
                    
                    const confirmBtn = document.createElement('button');
                    confirmBtn.className = 'px-4 py-2 text-white bg-red-600 hover:bg-red-700 rounded-lg font-bold transition shadow';
                    confirmBtn.textContent = '確定送出';
                    confirmBtn.onclick = () => closeModal(true);
                    
                    buttonsContainer.appendChild(cancelBtn);
                    buttonsContainer.appendChild(confirmBtn);
                } else {
                    const okBtn = document.createElement('button');
                    okBtn.className = 'px-4 py-2 text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg font-bold transition shadow';
                    okBtn.textContent = '確定';
                    okBtn.onclick = () => closeModal(true);
                    buttonsContainer.appendChild(okBtn);
                }
                
                modal.classList.remove('hidden');
            });
        }

        // ==========================================
        // 上半部：登記系統邏輯
        // ==========================================

        function generateStudentButtons() {
            studentGrid.innerHTML = '';
            for (let i = 1; i <= 29; i++) {
                const btn = document.createElement('button');
                btn.id = `btn-${i}`;
                btn.className = 'py-2 h-14 rounded text-sm font-bold transition-all duration-200 flex flex-col items-center justify-center';
                btn.onclick = () => toggleStudent(i, btn);
                studentGrid.appendChild(btn);
            }
        }

        async function fetchTasks(targetRowIndex = null) {
            showLoading('載入未交任務列表中...');
            try {
                const url = new URL(GAS_URL);
                url.searchParams.append('systemType', SYSTEM_TYPE);

                const response = await fetch(url.toString(), { method: 'GET', redirect: 'follow' });
                if (!response.ok) throw new Error(`伺服器狀態碼: ${response.status}`);
                
                tasksData = await response.json();
                
                // 🌟 座位圖熱區：自動全選新任務，並清理已封存的任務
                const activeRowIndexes = new Set(tasksData.map(t => t.rowIndex));
                tasksData.forEach(t => {
                    if (!knownTaskIds.has(t.rowIndex)) {
                        knownTaskIds.add(t.rowIndex);
                        selectedSeatTasks.add(t.rowIndex); // 預設全選
                    }
                });
                for (let val of selectedSeatTasks) {
                    if (!activeRowIndexes.has(val)) {
                        selectedSeatTasks.delete(val);
                        knownTaskIds.delete(val);
                    }
                }
                renderSeatTaskFilters();
                renderSeatGrid(); // 更新座位圖

                renderTaskSelect();
                
                if (tasksData.length > 0) {
                    let taskToSelect = null;
                    if (targetRowIndex === 'latest') {
                        taskToSelect = tasksData[tasksData.length - 1];
                    } else if (targetRowIndex) {
                        taskToSelect = tasksData.find(t => t.rowIndex == targetRowIndex);
                    }
                    if (taskToSelect) {
                        taskSelect.value = taskToSelect.rowIndex;
                        selectTask(taskToSelect.rowIndex);
                    }
                } else {
                     studentSection.classList.add('hidden');
                     newTaskForm.classList.add('hidden');
                     currentSelectedTask = null; 
                }
            } catch (error) {
                await showModal('系統提示', '⚠️ 連線 API 失敗！\n錯誤詳情：' + error.message);
            } finally {
                hideLoading();
            }
        }

        function renderTaskSelect() {
            taskSelect.innerHTML = `
                <option value="" disabled selected>請選擇...</option>
                <option value="new" class="text-red-600 font-bold">+ 新建任務項目</option>
            `;
            tasksData.forEach(task => {
                const option = document.createElement('option');
                option.value = task.rowIndex;
                option.textContent = task.name;
                taskSelect.appendChild(option);
            });
        }

        function selectTask(val) {
            missingCounts.clear();

            if (val === 'new') {
                for (let i = 1; i <= 29; i++) missingCounts.set(i, 0);
                newTaskForm.classList.remove('hidden');
                studentSection.classList.add('hidden');
                currentSelectedTask = null;
                
                modeToggle.checked = true;
                updateModeUI();
            } else if (val) {
                newTaskForm.classList.add('hidden');
                studentSection.classList.remove('hidden');
                
                currentSelectedTask = tasksData.find(t => t.rowIndex == val);
                
                let hasMissingRecords = false;
                for (let i = 1; i <= 29; i++) {
                    const cellVal = currentSelectedTask.status[i];
                    if (cellVal === "-1") {
                        missingCounts.set(i, -1);
                    } else if (cellVal !== "") {
                        const count = parseInt(cellVal, 10);
                        if (!isNaN(count) && count !== -1) {
                            missingCounts.set(i, count);
                            if (count > 0) hasMissingRecords = true;
                        } else {
                            missingCounts.set(i, 0);
                        }
                    } else {
                        missingCounts.set(i, 0);
                    }
                }

                if (hasMissingRecords) {
                    modeToggle.checked = false;
                } else {
                    modeToggle.checked = true;
                }
                updateModeUI();

                updateStudentButtonsStatus();
            } else {
                studentSection.classList.add('hidden');
                newTaskForm.classList.add('hidden');
                currentSelectedTask = null;
            }
        }

        taskSelect.addEventListener('change', (e) => selectTask(e.target.value));
        hideHandedInToggle.addEventListener('change', updateStudentButtonsStatus);
        
        function updateModeUI() {
            if (modeToggle.checked) {
                textAdd.className = 'text-sm font-bold text-red-600 transition-colors duration-200 cursor-pointer select-none';
                textSub.className = 'text-sm font-bold text-gray-400 transition-colors duration-200 cursor-pointer select-none';
            } else {
                textAdd.className = 'text-sm font-bold text-gray-400 transition-colors duration-200 cursor-pointer select-none';
                textSub.className = 'text-sm font-bold text-green-600 transition-colors duration-200 cursor-pointer select-none';
            }
        }
        modeToggle.addEventListener('change', updateModeUI);

        function renderButtonState(num, btn) {
            if (btn.disabled) return;
            const count = missingCounts.get(num) || 0;
            
            btn.className = 'py-2 h-14 rounded text-sm font-bold transition-all duration-100 flex flex-col items-center justify-center';
            const style = colorMap[count] || colorMap[9]; // 若超過9，預設用上限
            
            btn.classList.add(style.bg, style.text);
            if (style.extra) btn.classList.add(...style.extra.split(' '));
            
            if (count === 0) {
                btn.innerHTML = `<span class="text-base">${num}</span>`;
            } else {
                btn.innerHTML = `<span>${num}</span><span class="text-[10px] mt-0.5 bg-black bg-opacity-20 px-1.5 py-0.5 rounded-full leading-none">缺:${count}</span>`;
            }
        }

        function updateStudentButtonsStatus() {
            if (!currentSelectedTask) return;
            const status = currentSelectedTask.status;
            const isHideHandedIn = hideHandedInToggle.checked;

            for (let i = 1; i <= 29; i++) {
                const btn = document.getElementById(`btn-${i}`);
                const cellValue = status[i];
                const count = missingCounts.get(i) || 0;

                btn.disabled = false;
                btn.classList.remove('invisible');

                if (cellValue === "-1") {
                    btn.className = 'py-2 h-14 rounded text-sm font-bold flex flex-col items-center justify-center bg-blue-50 text-blue-400 border border-blue-200 cursor-not-allowed';
                    btn.disabled = true;
                    btn.innerHTML = `<span>${i}</span><span class="text-[10px] mt-0.5">免交</span>`;
                    
                    if (isHideHandedIn) btn.classList.add('invisible');
                } else {
                    renderButtonState(i, btn);
                    
                    if (isHideHandedIn && count === 0) {
                        btn.classList.add('invisible');
                    }
                }
            }
        }

        function toggleStudent(num, btn) {
            if (btn.disabled) return;
            let currentCount = missingCounts.get(num) || 0;
            const isAddMode = modeToggle.checked;

            if (isAddMode) {
                currentCount = (currentCount + 1) % 10; 
            } else {
                currentCount = currentCount - 1;
                if (currentCount < 0) currentCount = 0; 
            }
            
            missingCounts.set(num, currentCount);
            renderButtonState(num, btn);
        }

        createTaskBtn.addEventListener('click', async () => {
            const taskName = document.getElementById('newTaskName').value.trim();
            const exemptStr = document.getElementById('exemptStudents').value.trim();
            
            if (!taskName) {
                await showModal('系統提示', '請輸入任務名稱！');
                return;
            }

            let exemptList = [];
            if (exemptStr) {
                exemptList = exemptStr.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n) && n >= 1 && n <= 29);
            }

            showLoading('建立任務中...');
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        action: 'create',
                        taskName: taskName,
                        exemptList: exemptList,
                        systemType: SYSTEM_TYPE
                    }),
                    redirect: 'follow'
                });
                
                const result = await response.json();
                if (result.success) {
                    await showModal('系統提示', '任務建立成功！');
                    document.getElementById('newTaskName').value = '';
                    document.getElementById('exemptStudents').value = '';
                    await fetchTasks('latest');
                }
            } catch (error) {
                await showModal('系統提示', '建立失敗，請重試。\n' + error.message);
            } finally {
                hideLoading();
            }
        });

        submitBtn.addEventListener('click', async () => {
            if (!currentSelectedTask) return;

            const missingDataPayload = {};
            for (let i = 1; i <= 29; i++) {
                const btn = document.getElementById(`btn-${i}`);
                if (!btn.disabled) {
                    missingDataPayload[i] = missingCounts.get(i) || 0;
                }
            }

            const confirmMsg = "確定要送出紀錄嗎？\n\n注意：畫面的數字將覆蓋試算表，灰色(未點擊)的座號將一律記錄為「0 缺交」。\n若全班皆已歸 0 (無未交作業)，任務將自動封存(-1)！";
            const userConfirmed = await showModal('請確認', confirmMsg, true);
            if (!userConfirmed) return;

            let previousRowIndex = currentSelectedTask.rowIndex;
            showLoading('更新並檢查封存狀態中...');
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        action: 'update',
                        rowIndex: previousRowIndex,
                        missingData: missingDataPayload,
                        systemType: SYSTEM_TYPE
                    }),
                    redirect: 'follow'
                });
                
                const result = await response.json();
                if (result.success) {
                    await fetchTasks(previousRowIndex);
                    
                    const stillExists = tasksData.find(t => t.rowIndex == previousRowIndex);
                    if (stillExists) {
                        await showModal('系統提示', '紀錄已更新！');
                    } else {
                        await showModal('系統提示', '✅ 紀錄送出成功！全班皆已無未交作業，任務已自動封存 (-1)。');
                        if (tasksData.length > 0) {
                            let latestTask = tasksData[tasksData.length - 1];
                            taskSelect.value = latestTask.rowIndex;
                            selectTask(latestTask.rowIndex);
                        } else {
                            taskSelect.value = "";
                            selectTask("");
                        }
                    }
                }
            } catch (error) {
                await showModal('系統提示', '更新失敗，請重試。\n' + error.message);
            } finally {
                hideLoading();
            }
        });

        // ==========================================
        // 下半部：座位紀錄瀏覽器 (缺交熱區)
        // ==========================================

        async function fetchSeats() {
            try {
                const response = await fetch(SEAT_GAS_URL);
                const data = await response.json();
                
                if (data.status === 'empty') {
                    document.getElementById('seatStatus').innerText = "雲端無資料";
                    return;
                }

                currentSeats = JSON.parse(data.seats);
                renderSeatGrid();

                const lastDate = new Date(data.date).toLocaleString();
                document.getElementById('seatStatus').innerHTML = `<span class="text-emerald-600">●</span> 已同步：${lastDate}`;

            } catch (error) {
                console.error(error);
                document.getElementById('seatStatus').innerText = "連線失敗";
            }
        }

        // 渲染勾選任務標籤
        function renderSeatTaskFilters() {
            const container = document.getElementById('seatTaskFilters');
            container.innerHTML = '';

            if (tasksData.length === 0) {
                container.innerHTML = '<span class="text-xs text-gray-400 italic">目前無進行中的任務</span>';
                return;
            }

            tasksData.forEach(task => {
                const isChecked = selectedSeatTasks.has(task.rowIndex);
                const label = document.createElement('label');
                label.className = `inline-flex items-center cursor-pointer border px-2.5 py-1 rounded-full text-xs font-bold transition select-none ${
                    isChecked 
                    ? 'bg-red-50 hover:bg-red-100 border-red-200 text-red-700' 
                    : 'bg-gray-50 hover:bg-gray-100 border-gray-200 text-gray-500'
                }`;
                
                label.innerHTML = `
                    <input type="checkbox" class="mr-1.5 accent-red-600 cursor-pointer" value="${task.rowIndex}" ${isChecked ? 'checked' : ''}>
                    ${task.name}
                `;

                const checkbox = label.querySelector('input');
                checkbox.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        selectedSeatTasks.add(task.rowIndex);
                        label.className = 'inline-flex items-center cursor-pointer bg-red-50 hover:bg-red-100 border border-red-200 text-red-700 px-2.5 py-1 rounded-full text-xs font-bold transition select-none';
                    } else {
                        selectedSeatTasks.delete(task.rowIndex);
                        label.className = 'inline-flex items-center cursor-pointer bg-gray-50 hover:bg-gray-100 border border-gray-200 text-gray-500 px-2.5 py-1 rounded-full text-xs font-bold transition select-none';
                    }
                    renderSeatGrid(); // 勾選狀態改變時，重新計算加總並渲染座位表
                });

                container.appendChild(label);
            });
        }

        // 加總計算：傳入座號，回傳在勾選任務中的缺交總數。全部免交回傳-1
        function getAggregatedMissingCount(seatIdNum) {
            if (selectedSeatTasks.size === 0) return 0;
            
            let total = 0;
            let exemptCount = 0;
            let checkedCount = 0;

            tasksData.forEach(task => {
                if (selectedSeatTasks.has(task.rowIndex)) {
                    checkedCount++;
                    const val = task.status[seatIdNum];
                    if (val === "-1" || val === -1) {
                        exemptCount++;
                    } else if (val !== "" && val !== undefined) {
                        const count = parseInt(val, 10);
                        if (!isNaN(count) && count > 0) {
                            total += count;
                        }
                    }
                }
            });

            if (checkedCount > 0 && exemptCount === checkedCount) {
                return -1; // 該生在勾選的任務中皆為免交
            }
            return total;
        }

        function renderSeatGrid() {
            const grid = document.getElementById('seat-grid');
            grid.innerHTML = '';

            currentSeats.forEach((seat) => {
                const card = document.createElement('div');
                
                const displayType = seat.type;
                const styleObj = colorCycle.find(c => c.type == displayType) || colorCycle[0];
                let seatClasses = `${styleObj.class} border-2`;
                let badgeHtml = '';

                // 🌟 獨立加總運算 (不與上方任務連動)
                const seatIdNum = parseInt(seat.id, 10);
                if (!isNaN(seatIdNum)) {
                    const count = getAggregatedMissingCount(seatIdNum);
                    
                    if (count > 0) {
                        // 若加總超過 9，鎖定使用最高色碼(9)
                        let colorKey = count > 9 ? 9 : count; 
                        const colorInfo = colorMap[colorKey] || colorMap[0];
                        
                        seatClasses = `${colorInfo.bg} ${colorInfo.text} border-transparent`;
                        if (colorInfo.extra) seatClasses += ` ${colorInfo.extra}`;
                        
                        // 🌟 改變小圓圈文字：從 缺X 改為 -X
                        badgeHtml = `<div class="absolute -top-2 -right-2 bg-black text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full shadow-md border border-white font-bold z-10">-${count}</div>`;
                    } else if (count === -1) {
                        seatClasses = 'bg-blue-50 text-blue-400 border-blue-200';
                        badgeHtml = `<div class="absolute -top-2 -right-2 bg-blue-500 text-white text-[9px] px-1 rounded shadow border border-white z-10">免交</div>`;
                    } else if (selectedSeatTasks.size > 0) {
                        // 缺交為 0 且有勾選任務時，套用半透明淡化，突顯缺交者
                        seatClasses += ' opacity-40';
                    }
                }
                
                card.className = `seat-card ${seatClasses} py-1 px-2 rounded flex flex-col items-center justify-center text-center text-sm font-semibold min-h-[40px] shadow-sm relative`;
                
                if (seat.name === "空位" || !seat.name) {
                    card.innerHTML = `<span class="text-[10px] opacity-50 italic">空位</span>`;
                } else {
                    card.innerHTML = `
                        <div class="leading-tight relative z-0">${seat.name}</div>
                        <div class="text-[9px] opacity-70 relative z-0">(${seat.id})</div>
                        ${badgeHtml}
                    `;
                }

                grid.appendChild(card);
            });
        }

    </script>
</body>
</html>
